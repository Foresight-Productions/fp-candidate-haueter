<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1235 650">
  <!-- True US flag proportions (19:10). 13 stripes, top red. Canton = 7 stripes tall, 2/5 width. 50 stars in 9 rows (6-5-6-5-6-5-6-5-6). -->
  <rect width="1235" height="650" fill="#B22234"/>
  <!-- 6 white stripes -->
  <g fill="#FFFFFF">
    <rect y="50"  width="1235" height="50"/>
    <rect y="150" width="1235" height="50"/>
    <rect y="250" width="1235" height="50"/>
    <rect y="350" width="1235" height="50"/>
    <rect y="450" width="1235" height="50"/>
    <rect y="550" width="1235" height="50"/>
  </g>
  <!-- Canton -->
  <rect width="494" height="350" fill="#3C3B6E"/>
  <!-- 50 stars: rows of 6 and 5 alternating, 9 rows total -->
  <g fill="#FFFFFF">
    <!-- Star path template stamped via symbol -->
    <symbol id="s" viewBox="-15 -15 30 30" overflow="visible">
      <polygon points="0,-14 3.3,-4.3 13.3,-4.3 5.2,1.6 8.5,11.3 0,5.4 -8.5,11.3 -5.2,1.6 -13.3,-4.3 -3.3,-4.3"/>
    </symbol>
    <!-- Row 1 (y=35) — 6 stars -->
    <use href="#s" x="41"  y="35"/><use href="#s" x="123" y="35"/><use href="#s" x="206" y="35"/><use href="#s" x="288" y="35"/><use href="#s" x="370" y="35"/><use href="#s" x="453" y="35"/>
    <!-- Row 2 (y=70) — 5 stars -->
    <use href="#s" x="82"  y="70"/><use href="#s" x="165" y="70"/><use href="#s" x="247" y="70"/><use href="#s" x="329" y="70"/><use href="#s" x="411" y="70"/>
    <!-- Row 3 (y=105) — 6 stars -->
    <use href="#s" x="41"  y="105"/><use href="#s" x="123" y="105"/><use href="#s" x="206" y="105"/><use href="#s" x="288" y="105"/><use href="#s" x="370" y="105"/><use href="#s" x="453" y="105"/>
    <!-- Row 4 (y=140) — 5 stars -->
    <use href="#s" x="82"  y="140"/><use href="#s" x="165" y="140"/><use href="#s" x="247" y="140"/><use href="#s" x="329" y="140"/><use href="#s" x="411" y="140"/>
    <!-- Row 5 (y=175) — 6 stars -->
    <use href="#s" x="41"  y="175"/><use href="#s" x="123" y="175"/><use href="#s" x="206" y="175"/><use href="#s" x="288" y="175"/><use href="#s" x="370" y="175"/><use href="#s" x="453" y="175"/>
    <!-- Row 6 (y=210) — 5 stars -->
    <use href="#s" x="82"  y="210"/><use href="#s" x="165" y="210"/><use href="#s" x="247" y="210"/><use href="#s" x="329" y="210"/><use href="#s" x="411" y="210"/>
    <!-- Row 7 (y=245) — 6 stars -->
    <use href="#s" x="41"  y="245"/><use href="#s" x="123" y="245"/><use href="#s" x="206" y="245"/><use href="#s" x="288" y="245"/><use href="#s" x="370" y="245"/><use href="#s" x="453" y="245"/>
    <!-- Row 8 (y=280) — 5 stars -->
    <use href="#s" x="82"  y="280"/><use href="#s" x="165" y="280"/><use href="#s" x="247" y="280"/><use href="#s" x="329" y="280"/><use href="#s" x="411" y="280"/>
    <!-- Row 9 (y=315) — 6 stars -->
    <use href="#s" x="41"  y="315"/><use href="#s" x="123" y="315"/><use href="#s" x="206" y="315"/><use href="#s" x="288" y="315"/><use href="#s" x="370" y="315"/><use href="#s" x="453" y="315"/>
  </g>
</svg>
