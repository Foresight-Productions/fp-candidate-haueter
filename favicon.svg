<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
  <!-- Red background = 7 red stripes -->
  <rect width="100" height="100" fill="#B22234"/>
  <!-- 6 white stripes (stripe height = 100/13 = 7.6923) -->
