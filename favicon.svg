<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#fff"/>
  <!-- 7 chunky stripes (4 red, 3 white) optimized for favicon legibility -->
  <g fill="#B22234">
    <rect y="0"      width="32" height="4.571"/>
    <rect y="9.143"  width="32" height="4.571"/>
    <rect y="18.286" width="32" height="4.571"/>
    <rect y="27.429" width="32" height="4.572"/>
  </g>
  <!-- Blue canton (top-left) -->
  <rect width="14" height="13.714" fill="#3C3B6E"/>
  <!-- Single bold white star, centered in canton -->
  <polygon fill="#fff" points="7,2.4 8.47,6.93 13.24,6.93 9.38,9.73 10.85,14.26 7,11.46 3.15,14.26 4.62,9.73 0.76,6.93 5.53,6.93"/>
</svg>
