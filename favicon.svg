  <g fill="#B22234">
    <rect y="0"  width="32" height="2.4615"/>
    <rect y="4.9231"  width="32" height="2.4615"/>
    <rect y="9.8462"  width="32" height="2.4615"/>
    <rect y="14.7692" width="32" height="2.4615"/>
    <rect y="19.6923" width="32" height="2.4615"/>
    <rect y="24.6154" width="32" height="2.4615"/>
    <rect y="29.5385" width="32" height="2.4615"/>
  </g>
  <!-- Canton -->
