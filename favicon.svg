<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7410 3900" preserveAspectRatio="xMidYMid meet">
  <!-- Official US flag spec proportions (1.9:1). Tiles perfectly at any size. -->
  <!-- Field: 7 red stripes (drawn as solid background) + 6 white stripes -->
  <rect width="7410" height="3900" fill="#B22234"/>
  <g fill="#FFFFFF">
    <rect y="300"  width="7410" height="300"/>
    <rect y="900"  width="7410" height="300"/>
    <rect y="1500" width="7410" height="300"/>
    <rect y="2100" width="7410" height="300"/>
    <rect y="2700" width="7410" height="300"/>
    <rect y="3300" width="7410" height="300"/>
  </g>
  <!-- Canton: 0.4 × width, 7 stripes tall -->
  <rect width="2964" height="2100" fill="#3C3B6E"/>
  <!-- 50 stars in canonical 6-5-6-5-6-5-6-5-6 grid -->
  <defs>
    <g id="s">
      <polygon fill="#FFFFFF" points="0,-152.4 35.8,-47.1 146.5,-47.1 56.4,17.9 92.2,123.3 0,58.3 -92.2,123.3 -56.4,17.9 -146.5,-47.1 -35.8,-47.1"/>
    </g>
  </defs>
  <g>
    <!-- Row 1 (y=210) — 6 stars -->
    <use href="#s" x="247"  y="210"/><use href="#s" x="741"  y="210"/><use href="#s" x="1235" y="210"/><use href="#s" x="1729" y="210"/><use href="#s" x="2223" y="210"/><use href="#s" x="2717" y="210"/>
    <!-- Row 2 (y=420) — 5 stars -->
    <use href="#s" x="494"  y="420"/><use href="#s" x="988"  y="420"/><use href="#s" x="1482" y="420"/><use href="#s" x="1976" y="420"/><use href="#s" x="2470" y="420"/>
    <!-- Row 3 (y=630) — 6 stars -->
    <use href="#s" x="247"  y="630"/><use href="#s" x="741"  y="630"/><use href="#s" x="1235" y="630"/><use href="#s" x="1729" y="630"/><use href="#s" x="2223" y="630"/><use href="#s" x="2717" y="630"/>
    <!-- Row 4 (y=840) — 5 stars -->
    <use href="#s" x="494"  y="840"/><use href="#s" x="988"  y="840"/><use href="#s" x="1482" y="840"/><use href="#s" x="1976" y="840"/><use href="#s" x="2470" y="840"/>
    <!-- Row 5 (y=1050) — 6 stars -->
    <use href="#s" x="247"  y="1050"/><use href="#s" x="741"  y="1050"/><use href="#s" x="1235" y="1050"/><use href="#s" x="1729" y="1050"/><use href="#s" x="2223" y="1050"/><use href="#s" x="2717" y="1050"/>
    <!-- Row 6 (y=1260) — 5 stars -->
    <use href="#s" x="494"  y="1260"/><use href="#s" x="988"  y="1260"/><use href="#s" x="1482" y="1260"/><use href="#s" x="1976" y="1260"/><use href="#s" x="2470" y="1260"/>
    <!-- Row 7 (y=1470) — 6 stars -->
    <use href="#s" x="247"  y="1470"/><use href="#s" x="741"  y="1470"/><use href="#s" x="1235" y="1470"/><use href="#s" x="1729" y="1470"/><use href="#s" x="2223" y="1470"/><use href="#s" x="2717" y="1470"/>
    <!-- Row 8 (y=1680) — 5 stars -->
    <use href="#s" x="494"  y="1680"/><use href="#s" x="988"  y="1680"/><use href="#s" x="1482" y="1680"/><use href="#s" x="1976" y="1680"/><use href="#s" x="2470" y="1680"/>
    <!-- Row 9 (y=1890) — 6 stars -->
    <use href="#s" x="247"  y="1890"/><use href="#s" x="741"  y="1890"/><use href="#s" x="1235" y="1890"/><use href="#s" x="1729" y="1890"/><use href="#s" x="2223" y="1890"/><use href="#s" x="2717" y="1890"/>
  </g>
</svg>
