    <rect y="7.6923"  width="100" height="7.6923"/>
    <rect y="23.0769" width="100" height="7.6923"/>
    <rect y="38.4615" width="100" height="7.6923"/>
    <rect y="53.8462" width="100" height="7.6923"/>
    <rect y="69.2308" width="100" height="7.6923"/>
    <rect y="84.6154" width="100" height="7.6923"/>
  </g>
  <!-- Canton (7 stripes tall, 40% wide) -->
  <rect width="40" height="53.8462" fill="#3C3B6E"/>
