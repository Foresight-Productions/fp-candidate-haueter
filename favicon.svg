  <!-- Single white star centered in canton -->
  <polygon fill="#fff" points="7,2.6 8.18,6.23 12,6.23 8.91,8.47 10.09,12.1 7,9.86 3.91,12.1 5.09,8.47 2,6.23 5.82,6.23"/>
