<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you | Tyler Haueter for Yakima County Prosecutor</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://tylerforyakima.com/thanks.html">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#A8100D;--ink:#0E0E0E;--bg:#FFFFFF;--text:#1A1A1A;--text-muted:#5A5A5A;--rule:#DCD6CB}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;line-height:1.6}
a{color:inherit;text-decoration:none}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1.5rem;text-align:center;max-width:42rem;margin:0 auto}
.eyebrow{font-family:'Oswald',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.42em;text-transform:uppercase;color:var(--primary);margin-bottom:1.6rem}
h1{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:clamp(2.6rem,6vw,4.4rem);line-height:1.05;letter-spacing:-0.02em;margin-bottom:1.2rem;color:var(--ink)}
h1 em{font-style:italic;font-weight:500;color:var(--primary)}
.lede{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:1.25rem;color:var(--text-muted);margin-bottom:2.4rem;max-width:34rem}
.divider{width:48px;height:2px;background:var(--primary);margin:0 auto 2.4rem}
.btn{display:inline-flex;align-items:center;gap:.6rem;padding:1rem 1.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:.8rem;border-radius:1px;border:1px solid var(--ink);background:var(--ink);color:#fff;transition:transform .25s ease,background .25s ease}
.btn:hover{background:var(--primary);border-color:var(--primary);transform:translateY(-1px)}
footer{padding:1.6rem 1.5rem;text-align:center;font-size:.78rem;color:var(--text-muted);border-top:1px solid var(--rule)}
</style>
</head>
<body>
<main class="wrap">
  <div class="eyebrow">Thank You</div>
  <h1>You're <em>in</em>.</h1>
  <div class="divider"></div>
  <p class="lede">Thanks for signing up. The team will be in touch soon with next steps.</p>
  <a href="/" class="btn">Back to homepage</a>
</main>
<footer>
  &copy; 2026 Tyler Haueter for Yakima County Prosecutor. All rights reserved.
</footer>
</body>
</html>
